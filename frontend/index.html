<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Consulta Multas SIMIT</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #333;
    }

    header {
      background: #1a3c6e;
      color: white;
      padding: 20px 40px;
    }

    header h1 { font-size: 1.5rem; }
    header p  { font-size: 0.9rem; opacity: 0.8; margin-top: 4px; }

    .container {
      max-width: 960px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 28px;
      margin-bottom: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 18px;
      color: #1a3c6e;
      border-bottom: 2px solid #e8edf3;
      padding-bottom: 10px;
    }

    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #cdd5e0;
      border-radius: 6px;
      font-size: 1rem;
      text-transform: uppercase;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #1a3c6e;
    }

    button {
      padding: 10px 24px;
      background: #1a3c6e;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover    { background: #14305a; }
    button:disabled { background: #aab4c4; cursor: not-allowed; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .badge-success { background: #d4edda; color: #155724; }
    .badge-error   { background: #f8d7da; color: #721c24; }
    .badge-pending { background: #fff3cd; color: #856404; }

    .resultado-box {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 20px;
      margin-top: 16px;
    }

    .resultado-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .resultado-header h3 { font-size: 1rem; color: #1a3c6e; }

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .stat {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 10px 16px;
      text-align: center;
    }

    .stat .numero {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a3c6e;
    }

    .stat .label {
      font-size: 0.75rem;
      color: #666;
      margin-top: 2px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    th {
      background: #1a3c6e;
      color: white;
      padding: 10px 12px;
      text-align: left;
    }

    td {
      padding: 9px 12px;
      border-bottom: 1px solid #eef0f3;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td      { background: #f5f7fa; }

    .loading {
      text-align: center;
      padding: 30px;
      color: #666;
    }

    .loading::after {
      content: '';
      display: inline-block;
      width: 20px; height: 20px;
      border: 3px solid #ccc;
      border-top-color: #1a3c6e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #f8d7da;
      color: #721c24;
      padding: 12px 16px;
      border-radius: 6px;
      margin-top: 12px;
    }

    .sin-multas {
      text-align: center;
      padding: 24px;
      color: #555;
    }

    textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #cdd5e0;
      border-radius: 6px;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 80px;
      text-transform: uppercase;
    }

    .tab-buttons {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .tab-btn {
      background: #e8edf3;
      color: #1a3c6e;
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    .tab-btn.active {
      background: #1a3c6e;
      color: white;
    }

    #seccion-masiva { display: none; }
  </style>
</head>
<body>

<header>
  <h1>🚦 Consulta de Multas SIMIT</h1>
  <p>Consulta comparendos y multas de vehículos en Colombia</p>
</header>

<div class="container">

  <!-- Tabs -->
  <div class="tab-buttons">
    <button class="tab-btn active" onclick="mostrarTab('individual')">Consulta Individual</button>
    <button class="tab-btn"        onclick="mostrarTab('masiva')">Consulta Masiva</button>
    <button class="tab-btn"        onclick="mostrarTab('historico')">Histórico</button>
  </div>

  <!-- INDIVIDUAL -->
  <div id="seccion-individual">
    <div class="card">
      <h2>🔍 Consulta por Placa</h2>
      <div class="form-row">
        <input type="text" id="inputPlaca" placeholder="Ej: ABC123" maxlength="6" />
        <button onclick="consultarIndividual()" id="btnConsultar">Consultar</button>
      </div>
    </div>
    <div id="resultado-individual"></div>
  </div>

  <!-- MASIVA -->
  <div id="seccion-masiva">
    <div class="card">
      <h2>📋 Consulta Masiva de Placas</h2>
      <p style="font-size:0.85rem; color:#666; margin-bottom:12px;">
        Ingresa las placas separadas por comas. Ejemplo: ABC123, XYZ987, LMN456
      </p>
      <textarea id="inputMasiva" placeholder="ABC123, XYZ987, LMN456"></textarea>
      <br/><br/>
      <button onclick="consultarMasiva()" id="btnMasiva">Consultar Todas</button>
    </div>
    <div id="resultado-masiva"></div>
  </div>

  <!-- HISTORICO -->
  <div id="seccion-historico" style="display:none;">
    <div class="card">
      <h2>📂 Histórico de Consultas</h2>
      <button onclick="cargarHistorico()">🔄 Actualizar</button>
    </div>
    <div id="resultado-historico"></div>
  </div>

</div>

<script>
  const API = "http://127.0.0.1:8000";

  function mostrarTab(tab) {
    document.getElementById("seccion-individual").style.display = tab === "individual" ? "block" : "none";
    document.getElementById("seccion-masiva").style.display     = tab === "masiva"     ? "block" : "none";
    document.getElementById("seccion-historico").style.display  = tab === "historico"  ? "block" : "none";

    document.querySelectorAll(".tab-btn").forEach((b, i) => {
      b.classList.toggle("active", ["individual","masiva","historico"][i] === tab);
    });

    if (tab === "historico") cargarHistorico();
  }

  function badgeEstado(estado) {
    if (estado === "EXITOSO") return `<span class="badge badge-success">✅ Exitoso</span>`;
    if (estado === "ERROR")   return `<span class="badge badge-error">❌ Error</span>`;
    return `<span class="badge badge-pending">${estado}</span>`;
  }

  function renderMultas(multas) {
    if (!multas || multas.length === 0)
      return `<div class="sin-multas">✅ Esta placa no tiene multas registradas en SIMIT.</div>`;

    return `
      <table>
        <thead>
          <tr>
            <th>Número</th>
            <th>Fecha</th>
            <th>Estado</th>
            <th>Valor</th>
          </tr>
        </thead>
        <tbody>
          ${multas.map(m => `
            <tr>
              <td>${m.numero || "-"}</td>
              <td>${m.fecha  || "-"}</td>
              <td><span class="badge badge-pending">${m.estado || "-"}</span></td>
              <td>$${Number(m.valor).toLocaleString("es-CO")}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>`;
  }

  async function consultarIndividual() {
    const placa = document.getElementById("inputPlaca").value.trim().toUpperCase();
    if (!placa) { alert("Ingresa una placa"); return; }

    const btn = document.getElementById("btnConsultar");
    const div = document.getElementById("resultado-individual");
    btn.disabled = true;
    div.innerHTML = `<div class="loading">Consultando SIMIT para ${placa}... esto puede tomar hasta 20 segundos</div>`;

    try {
      const res  = await fetch(`${API}/consulta-individual`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ placa })
      });
      const data = await res.json();

      if (!res.ok) {
        div.innerHTML = `<div class="error-msg">❌ ${data.detail || "Error en la consulta"}</div>`;
        return;
      }

      div.innerHTML = `
        <div class="resultado-box">
          <div class="resultado-header">
            <h3>Placa: <strong>${data.placa}</strong></h3>
            ${badgeEstado(data.estado)}
          </div>
          <div class="stats">
            <div class="stat">
              <div class="numero">${data.cantidadMultas}</div>
              <div class="label">Multas encontradas</div>
            </div>
            <div class="stat">
              <div class="numero">${new Date(data.fechaConsulta).toLocaleString("es-CO")}</div>
              <div class="label">Fecha consulta</div>
            </div>
          </div>
          ${data.error ? `<div class="error-msg">⚠️ ${data.error}</div>` : ""}
          ${renderMultas(data.multas)}
        </div>`;
    } catch (e) {
      div.innerHTML = `<div class="error-msg">❌ No se pudo conectar con el servidor. ¿Está corriendo el backend?</div>`;
    } finally {
      btn.disabled = false;
    }
  }

  async function consultarMasiva() {
    const raw    = document.getElementById("inputMasiva").value.trim();
    const placas = raw.split(",").map(p => p.trim().toUpperCase()).filter(p => p);
    if (placas.length === 0) { alert("Ingresa al menos una placa"); return; }

    const btn = document.getElementById("btnMasiva");
    const div = document.getElementById("resultado-masiva");
    btn.disabled = true;
    div.innerHTML = `<div class="loading">Consultando ${placas.length} placa(s)... esto puede tardar varios minutos</div>`;

    try {
      const res  = await fetch(`${API}/consulta-masiva`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ placas })
      });
      const data = await res.json();

      div.innerHTML = `
        <div class="card">
          <h2>Resultados — ${data.total} placa(s) consultadas</h2>
          ${data.resultados.map(r => `
            <div class="resultado-box" style="margin-bottom:16px;">
              <div class="resultado-header">
                <h3>Placa: <strong>${r.placa}</strong></h3>
                ${badgeEstado(r.estado)}
              </div>
              <p style="font-size:0.85rem; color:#555; margin-bottom:12px;">
                Multas: <strong>${r.cantidadMultas}</strong> |
                Fecha: ${new Date(r.fechaConsulta).toLocaleString("es-CO")}
              </p>
              ${r.error ? `<div class="error-msg">⚠️ ${r.error}</div>` : ""}
              ${renderMultas(r.multas)}
            </div>
          `).join("")}
        </div>`;
    } catch(e) {
      div.innerHTML = `<div class="error-msg">❌ No se pudo conectar con el servidor.</div>`;
    } finally {
      btn.disabled = false;
    }
  }

  async function cargarHistorico() {
    const div = document.getElementById("resultado-historico");
    div.innerHTML = `<div class="loading">Cargando histórico...</div>`;

    try {
      const res  = await fetch(`${API}/historico`);
      const data = await res.json();

      if (data.length === 0) {
        div.innerHTML = `<div class="card"><p>No hay consultas registradas aún.</p></div>`;
        return;
      }

      div.innerHTML = `
        <div class="card">
          <h2>Últimas ${data.length} consultas</h2>
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Placa</th>
                <th>Fecha</th>
                <th>Tipo</th>
                <th>Estado</th>
                <th>Multas</th>
              </tr>
            </thead>
            <tbody>
              ${data.map(r => `
                <tr>
                  <td>${r.id}</td>
                  <td><strong>${r.placa}</strong></td>
                  <td>${new Date(r.fechaConsulta).toLocaleString("es-CO")}</td>
                  <td>${r.tipoConsulta}</td>
                  <td>${badgeEstado(r.estado)}</td>
                  <td>${r.cantidadMultas}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>`;
    } catch(e) {
      div.innerHTML = `<div class="error-msg">❌ No se pudo cargar el histórico.</div>`;
    }
  }

  // Permitir Enter en el input de placa
  document.getElementById("inputPlaca").addEventListener("keypress", e => {
    if (e.key === "Enter") consultarIndividual();
  });
</script>

</body>
</html>
